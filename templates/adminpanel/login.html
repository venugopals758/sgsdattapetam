{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login — Divine Temple CMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Poppins', sans-serif; }
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #2b1500 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #fff; border-radius: 16px;
      padding: 44px 40px; width: 100%; max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,.35);
    }
    .login-logo {
      width: 52px; height: 52px; background: #ff7a00;
      border-radius: 13px; display: flex; align-items: center;
      justify-content: center; color: #fff; font-size: 1.4rem;
      margin: 0 auto 20px;
    }
    .login-title { font-size: 1.35rem; font-weight: 700; color: #1a1a2e; text-align: center; margin-bottom: 5px; }
    .login-sub   { font-size: .83rem; color: #6c757d; text-align: center; margin-bottom: 30px; }
    .form-label  { font-size: .82rem; font-weight: 600; color: #1a1a2e; }
    .form-control {
      border-radius: 9px; padding: 11px 14px; font-size: .88rem;
      border: 1.5px solid #dee2e6;
    }
    .form-control:focus {
      border-color: #ff7a00;
      box-shadow: 0 0 0 3px rgba(255,122,0,.12);
    }
    .input-group-text {
      background: #f8f9fa; border-radius: 9px 0 0 9px;
      border: 1.5px solid #dee2e6; color: #6c757d;
    }
    .input-group .form-control { border-radius: 0 9px 9px 0; }
    .btn-login {
      background: #ff7a00; color: #fff; border: none;
      border-radius: 9px; padding: 12px; font-weight: 600;
      font-size: .9rem; width: 100%; transition: all .2s;
    }
    .btn-login:hover { background: #e06900; transform: translateY(-1px); }
    .back-link { text-align: center; margin-top: 18px; }
    .back-link a { font-size: .8rem; color: #6c757d; text-decoration: none; }
    .back-link a:hover { color: #ff7a00; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo"><i class="fas fa-om"></i></div>
    <h4 class="login-title">Admin Login</h4>
    <p class="login-sub">Sign in to the Temple CMS</p>

    {% if messages %}
      {% for msg in messages %}
      <div class="alert alert-danger py-2 mb-3" style="font-size:.83rem;border-radius:9px;">{{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-user"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="fas fa-sign-in-alt me-2"></i>Sign In
      </button>
    </form>

    <div class="back-link">
      <a href="/"><i class="fas fa-arrow-left me-1"></i>Back to main site</a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
