{% extends 'adminpanel/base.html' %}

{% block title %}Confirm Delete{% endblock %}
{% block topbar_title %}Confirm Delete{% endblock %}

{% block content %}
<div class="row">
  <div class="col-md-5">
    <div class="form-card text-center">
      <div style="font-size:2.5rem;color:#dc3545;margin-bottom:14px;">
        <i class="fas fa-exclamation-triangle"></i>
      </div>
      <h5 class="fw-700 mb-2">Are you sure?</h5>
      <p class="text-muted mb-4" style="font-size:.88rem;">
        You are about to delete <strong>{{ obj }}</strong>.<br>This action cannot be undone.
      </p>
      <form method="post" class="d-flex gap-2 justify-content-center">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger px-4">
          <i class="fas fa-trash me-1"></i> Delete
        </button>
        <a href="{% url back %}" class="btn btn-outline-secondary px-4">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
